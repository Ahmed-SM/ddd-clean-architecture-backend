# =====================================================
# Docker Compose - Full Stack
# =====================================================

services:
  # ---------------------------------------------------
  # Application Service
  # ---------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-ddd-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_NAME=ddd-clean-architecture
      - APP_ENV=production
      - APP_ADDR=:8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ddd_db
      - DB_SSLMODE=disable
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ddd-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: go-ddd-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ddd_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ddd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ddd_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: go-ddd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ddd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes

  # ---------------------------------------------------
  # Migrations (Optional - runs once)
  # ---------------------------------------------------
  migrate:
    image: migrate/migrate:v4.17.0
    container_name: go-ddd-migrate
    volumes:
      - ./scripts/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://postgres:postgres@postgres:5432/ddd_db?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddd-network
    profiles:
      - migrate

networks:
  ddd-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
